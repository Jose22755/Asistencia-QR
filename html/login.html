<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Asistencia QR</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">

  <!-- SweetAlert -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

  <!-- TU CSS -->
  <link rel="stylesheet" href="../css/login.css">
</head>

<body>

<div class="login-container">
  <div class="card-login">

    <h2 class="titulo">Asistencia QR - UNICARIBE</h2>

    <!-- 🔥 FORM LOGIN -->
    <form id="formLogin">

      <!-- EMAIL -->
      <input type="email" id="email" placeholder="Correo">

      <!-- PASSWORD -->
      <div class="password-container">
        <input type="password" id="password" placeholder="Contraseña">
        <i class="bi bi-eye-slash toggle-password"></i>
      </div>

      <!-- 🔥 OLVIDASTE CONTRASEÑA -->
<span class="link-password">¿Olvidaste tu contraseña?</span>
      <!-- LOGIN -->
<button type="submit" id="btnLogin">
  Iniciar Sesión
</button>

    </form>

    <div class="divider"></div>

    <!-- REGISTRO -->
    <button type="button" class="btn-secundario" id="btnRegistro">
      Registrarse
    </button>

    <!-- GOOGLE -->
    <button type="button" class="btn-secundario" id="btnGoogle">
      <i class="bi bi-google"></i> Continuar con Google
    </button>

  </div>
</div>

<script type="module" src="../js/auth.js"></script>

</body>
</html>
